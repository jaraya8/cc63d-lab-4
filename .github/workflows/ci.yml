name: CI

# Corre en cada push y en cada pull request hacia main.
# El push es lo que exige el enunciado para dejar los runs rojo y verde.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: lint + test
    runs-on: ubuntu-latest

    steps:
      # --- preparar: traer el código y montar el entorno ---
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # misma versión que la imagen del Dockerfile
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      # --- lint: estilo y errores estáticos (opcional según el enunciado) ---
      - name: Lint (ruff)
        run: ruff check .

      # --- test: el corazón de la pipeline ---
      - name: Test (pytest)
        run: pytest -v
